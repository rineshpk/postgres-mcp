name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.1)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT: src/PostgresMcp.Server/PostgresMcp.Server.csproj

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

  publish-native:
    needs: resolve-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: ubuntu-latest
            rid: linux-musl-x64
            extra-args: -p:PublishReadyToRun=false
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }} -r ${{ matrix.rid }}

      - name: Publish
        shell: bash
        run: |
          dotnet publish ${{ env.PROJECT }} \
            --configuration Release \
            --no-restore \
            -r ${{ matrix.rid }} \
            -p:Version=${{ needs.resolve-version.outputs.version }} \
            ${{ matrix.extra-args }} \
            --output ./publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}

  pack-and-push:
    needs: [resolve-version, publish-native]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Download all publish artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: publish-*
          path: ./publish

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Pack
        run: |
          dotnet pack ${{ env.PROJECT }} \
            --no-restore \
            --configuration Release \
            -p:Version=${{ needs.resolve-version.outputs.version }} \
            -p:PublishSingleFile=false \
            -p:SelfContained=false \
            --output ./nupkg

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "Error: NUGET_API_KEY secret is not set."
            exit 1
          fi
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
