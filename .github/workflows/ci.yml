name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT: src/PostgresMcp.Server/PostgresMcp.Server.csproj
  TESTS: tests/PostgresMcp.Tests/PostgresMcp.Tests.csproj

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ env.TESTS }} --no-build --configuration Release --verbosity normal

  pack-check:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Pack (dry run)
        run: |
          dotnet pack ${{ env.PROJECT }} \
            --configuration Release \
            -p:Version=0.0.0-ci \
            --output ./nupkg
